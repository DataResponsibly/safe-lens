apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: safe-lens
    component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: safe-lens
      component: backend
  template:
    metadata:
      labels:
        app: safe-lens
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dataresponsibly/safe-lens-backend:latest
          imagePullPolicy: Always
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          ports:
            - name: api
              containerPort: 8000
          resources:
            requests:
              cpu: 4
              memory: 16Gi
            limits:
              cpu: 8
              memory: 24Gi
              nvidia.com/gpu: 1
          # Until this succeeds, liveness/readiness do not run (avoids VRAM restarts during model load).
          startupProbe:
            httpGet:
              path: /
              port: 8000
            periodSeconds: 10
            failureThreshold: 120
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: In
                    values:
                      # Use one of those GPU models
                      - "Quadro-RTX-8000"
                      - "NVIDIA-A100-PCIE-40GB"
                      - "NVIDIA-A100-80GB-PCIe"
                      - "NVIDIA-RTX-A6000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: safe-lens
    component: backend
spec:
  type: ClusterIP
  selector:
    app: safe-lens
    component: backend
  ports:
    - name: api
      protocol: TCP
      port: 8000
      targetPort: 8000
