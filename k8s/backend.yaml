apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: safe-lens
    component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: safe-lens
      component: backend
  template:
    metadata:
      labels:
        app: safe-lens
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/dataresponsibly/safe-lens-backend:latest
          imagePullPolicy: Always
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
          ports:
            - name: api
              containerPort: 8000
          resources:
            requests:
              cpu: 32
              memory: 128Gi
            limits:
              cpu: 32
              memory: 128Gi
              nvidia.com/gpu: 1
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: safe-lens
    component: backend
spec:
  type: ClusterIP
  selector:
    app: safe-lens
    component: backend
  ports:
    - name: api
      protocol: TCP
      port: 8000
      targetPort: 8000
