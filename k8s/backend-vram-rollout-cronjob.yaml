# When backend GPU VRAM (via nvidia-smi inside the backend pod) stays above the
# threshold, triggers `kubectl rollout restart` so a *new* ReplicaSet pod can be
# created under RollingUpdate (maxSurge: 1, maxUnavailable: 0). The old pod stays
# Running until the new pod is Ready, then it is terminated.
#
# Requires a *second schedulable GPU* (another node or same node with spare GPUs).
# If only one GPU exists on the node, the new pod stays Pending until the old pod
# frees the device (no overlap).
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-vram-rollout
  labels:
    app: safe-lens
    component: backend-vram-rollout
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-vram-rollout
  labels:
    app: safe-lens
    component: backend-vram-rollout
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-vram-rollout
  labels:
    app: safe-lens
    component: backend-vram-rollout
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: backend-vram-rollout
subjects:
  - kind: ServiceAccount
    name: backend-vram-rollout
    apiGroup: ""
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backend-vram-rollout
  labels:
    app: safe-lens
    component: backend-vram-rollout
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          serviceAccountName: backend-vram-rollout
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:1.31
              imagePullPolicy: IfNotPresent
              env:
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: TARGET_DEPLOYMENT
                  value: backend
                - name: VRAM_THRESHOLD
                  value: "0.8"
                # Skip re-triggering a rollout for this many seconds after the last trigger.
                - name: COOLDOWN_SECONDS
                  value: "1800"
              command:
                - /bin/bash
                - -c
                - |
                  set -euo pipefail
                  NS="${POD_NAMESPACE}"
                  DEPLOY="${TARGET_DEPLOYMENT}"
                  THRESH="${VRAM_THRESHOLD}"
                  COOLDOWN="${COOLDOWN_SECONDS}"
                  NOW="$(date +%s)"

                  last="$(
                    kubectl get deployment "${DEPLOY}" -n "${NS}" -o \
                      "jsonpath={.metadata.annotations['safe-lens/last-vram-rollout']}" 2>/dev/null || true
                  )"
                  if [[ -n "${last}" ]] && [[ "${last}" =~ ^[0-9]+$ ]]; then
                    if (( NOW - last < COOLDOWN )); then
                      echo "Within cooldown (${COOLDOWN}s), skipping."
                      exit 0
                    fi
                  fi

                  set +e
                  OUT="$(kubectl exec -n "${NS}" "deployment/${DEPLOY}" -c backend -- \
                    nvidia-smi --query-gpu=memory.used,memory.total --format=csv,noheader,nounits 2>/dev/null)"
                  RC=$?
                  set -e
                  if [[ "${RC}" -ne 0 ]] || [[ -z "${OUT}" ]]; then
                    echo "nvidia-smi exec failed or empty; skipping."
                    exit 0
                  fi

                  OVER="$(
                    echo "${OUT}" | awk -v "thresh=${THRESH}" -F', *' '
                      BEGIN { over = 0 }
                      NF >= 2 {
                        u = $1 + 0
                        t = $2 + 0
                        if (t > 0 && u / t > thresh) over = 1
                      }
                      END { print over }
                    '
                  )"
                  if [[ "${OVER}" != "1" ]]; then
                    echo "VRAM at or below threshold (${THRESH}); no action."
                    exit 0
                  fi

                  echo "VRAM above ${THRESH}; annotating cooldown and rolling deployment."
                  kubectl annotate deployment "${DEPLOY}" -n "${NS}" \
                    "safe-lens/last-vram-rollout=${NOW}" --overwrite
                  kubectl rollout restart "deployment/${DEPLOY}" -n "${NS}"
