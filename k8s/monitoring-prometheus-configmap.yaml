# Prometheus scrapes the backend /metrics endpoint (GPU utilization from torch.cuda).
# DCGM DaemonSet is omitted so a single-GPU node is not asked for a second GPU.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: safe-lens
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/backend.rules.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: backend
        metrics_path: /metrics
        static_configs:
          - targets: ["backend:8000"]

  backend.rules.yml: |
    groups:
      - name: safe_lens_backend
        rules:
          - alert: BackendGpuMemoryHigh
            expr: max(safe_lens_gpu_memory_utilization_ratio) > 0.8
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: Backend GPU memory utilization above 80%
              description: >-
                At least one CUDA device reports safe_lens_gpu_memory_utilization_ratio > 0.8
                for 2 minutes. Optional: CronJob backend-prometheus-rollout also restarts on
                instant Prometheus queries; use Alertmanager for notifications.
