apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: safe-lens
    component: frontend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: safe-lens
      component: frontend
  template:
    metadata:
      labels:
        app: safe-lens
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/dataresponsibly/safe-lens-frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: safe-lens
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: safe-lens
    component: frontend
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
