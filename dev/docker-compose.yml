# Development compose: CPU backend + Vite dev server behind an nginx reverse
# proxy (mirroring the production topology). No host-side npm or python
# installs needed - everything runs in containers.
services:
  backend:
    build:
      context: ..
      dockerfile: dev/Dockerfile.backend
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ../api:/src/api
      - ../requirements.txt:/src/requirements.txt
    expose:
      - "8000"
    ports:
      # Exposed to the host for direct debugging; production traffic goes
      # through nginx.
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: dev/Dockerfile.frontend
    environment:
      # Tell Vite to advertise the nginx-exposed port for the HMR websocket,
      # otherwise the browser tries to connect to Vite's internal port 5173.
      - VITE_HMR_CLIENT_PORT=8080
    volumes:
      - ../client/src:/app/src
      - ../client/index.html:/app/index.html
      - ../client/vite.config.js:/app/vite.config.js
      - ../client/tailwind.config.js:/app/tailwind.config.js
      - ../client/postcss.config.js:/app/postcss.config.js
      # Keep node_modules inside the container so the src bind mount above
      # does not shadow installed dependencies.
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - frontend
      - backend

volumes:
  frontend_node_modules:
