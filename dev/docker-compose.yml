# Development compose: CPU backend, volume mounts for live reload
services:
  backend:
    build:
      context: ..
      dockerfile: dev/Dockerfile.backend
    environment:
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ../api:/src/api
      - ../requirements.txt:/src/requirements.txt
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: dev/Dockerfile.frontend
    volumes:
      - ../client/main.html:/usr/share/nginx/html/index.html
      - ../client/css:/usr/share/nginx/html/css
      - ../client/js:/usr/share/nginx/html/js
      - ../nginx.frontend.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    depends_on:
      - backend
