# Development nginx: reverse-proxies everything to either the Vite dev server
# (for the React UI + HMR websocket) or the FastAPI backend. This mirrors the
# production topology from the top-level nginx.conf, but points / at Vite
# instead of serving pre-built static files.
server {
    listen 80;
    server_name localhost;

    # Vite dev server (React + HMR). The WebSocket upgrade headers are
    # required so that Hot Module Replacement keeps working through nginx.
    location / {
        proxy_pass http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    location /generate {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    location /regenerate {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
